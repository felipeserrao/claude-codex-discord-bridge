name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 17 * * *'  # Daily at 02:00 JST (17:00 UTC)
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check claude_discord/
        if: matrix.os == 'ubuntu-latest'

      - name: Format check
        run: uv run ruff format --check claude_discord/
        if: matrix.os == 'ubuntu-latest'

      - name: Type check
        run: uv run pyright claude_discord/
        if: matrix.os == 'ubuntu-latest'

      - name: Test
        run: uv run pytest tests/ -v --cov=claude_discord --cov-branch --cov-report=term-missing --cov-fail-under=75

  notify-failure:
    needs: [test]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Post CI failure to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # Security: untrusted user input must go through env vars, not inline ${{ }} expansion
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          REF="${{ github.ref_name }}"
          EVENT="${{ github.event_name }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          COMMIT="${{ github.sha }}"
          SHORT_SHA="${COMMIT:0:7}"

          if [ "$EVENT" = "pull_request" ]; then
            CONTEXT="PR #${PR_NUMBER} \`${PR_TITLE}\`"
          else
            CONTEXT="push to \`${REF}\` (\`${SHORT_SHA}\`)"
          fi

          curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"❌ **CI failed** — ${CONTEXT}\n${RUN_URL}\"}" \
            "$DISCORD_WEBHOOK_URL"

  create-issue-on-schedule-failure:
    needs: [test]
    # Only create issues for scheduled runs (not PR/push — those are dev feedback loops)
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create auto-fix label if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh label create "auto-fix" \
            --color "e4e669" \
            --description "Targeted for auto-fix by issue_resolver" \
            --repo "${REPO}" 2>/dev/null || true

      - name: Create GitHub Issue for scheduled CI failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          BODY=$(printf '## Scheduled CI Failure\n\nThe daily CI run failed on %s.\n\n**Workflow run:** %s\n\nPlease investigate the test failures and fix them. Check the linked workflow run for details.' "${DATE}" "${RUN_URL}")
          gh issue create \
            --title "CI failure on scheduled run (${DATE})" \
            --body "${BODY}" \
            --label "auto-fix" \
            --repo "${REPO}"
